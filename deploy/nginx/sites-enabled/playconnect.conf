# PlayConnect reverse proxy configuration
#
# Non-TLS: routes /api → api service, / → admin-web service
# TLS: uncomment the 443 block and update certificate paths

upstream api_backend {
    least_conn;
    server api:3001 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream admin_backend {
    server admin-web:3002;
}

upstream user_web_backend {
    server user-web:3003;
}

# --- HTTP (port 80) ---
server {
    listen 80;
    server_name _;

    # Uncomment the following to redirect all HTTP → HTTPS:
    # return 301 https://$host$request_uri;

    # Auth endpoints — stricter rate limit
    location /api/v1/auth/ {
        limit_req zone=api_auth burst=20 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    location /api/v1/admin/auth/ {
        limit_req zone=api_auth burst=20 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # API proxy
    location /api/ {
        limit_req zone=api_general burst=200 nodelay;

        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection '';

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # User Web proxy
    location /app {
        proxy_pass http://user_web_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }

    # Admin Web proxy (catch-all)
    location / {
        proxy_pass http://admin_backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        proxy_buffer_size 16k;
        proxy_buffers 4 32k;
    }
}

