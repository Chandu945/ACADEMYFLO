# Production-grade staging deployment with nginx reverse proxy.
# Usage: docker compose -f deploy/docker-compose.staging.yml up -d
#
# Prerequisites:
#   - deploy/.env.staging on the server (not committed)
#   - Docker images pushed to registry
#   - TLS certs at configured paths (optional — falls back to HTTP)

services:
  mongo:
    image: mongo:7
    container_name: academyflo-staging-mongo
    restart: unless-stopped
    volumes:
      - staging_mongo_data:/data/db
    environment:
      TZ: Asia/Kolkata
    command: ['--replSet', 'rs0']
    healthcheck:
      test:
        [
          'CMD',
          'mongosh',
          '--eval',
          "try { rs.status() } catch(e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] }) }",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - academyflo-net

  redis:
    image: redis:7-alpine
    container_name: academyflo-staging-redis
    restart: unless-stopped
    volumes:
      - staging_redis_data:/data
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory', '256mb', '--maxmemory-policy', 'allkeys-lru']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - academyflo-net

  api:
    image: ${DOCKER_REGISTRY:-ghcr.io/academyflo}/api:${IMAGE_TAG:-staging-latest}
    restart: unless-stopped
    expose:
      - '3001'
    env_file:
      - .env.staging
    environment:
      APP_ENV: staging
      NODE_ENV: production
      PORT: '3001'
      TZ: Asia/Kolkata
      MONGODB_URI: mongodb://mongo:27017/academyflo_staging?replicaSet=rs0
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3001/api/v1/health/liveness']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2G
          cpus: '4.0'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    networks:
      - academyflo-net

  admin-web:
    image: ${DOCKER_REGISTRY:-ghcr.io/academyflo}/admin-web:${IMAGE_TAG:-staging-latest}
    container_name: academyflo-staging-admin
    restart: unless-stopped
    expose:
      - '3002'
    env_file:
      - .env.staging
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_ENV: staging
      API_BASE_URL: http://api:3001
      COOKIE_SECRET: ${COOKIE_SECRET}
      COOKIE_SALT: ${COOKIE_SALT}
      TZ: Asia/Kolkata
    depends_on:
      - api
    networks:
      - academyflo-net

  user-web:
    image: ${DOCKER_REGISTRY:-ghcr.io/academyflo}/user-web:${IMAGE_TAG:-staging-latest}
    container_name: academyflo-staging-user-web
    restart: unless-stopped
    expose:
      - '3003'
    env_file:
      - .env.staging
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_ENV: staging
      API_BASE_URL: http://api:3001
      TZ: Asia/Kolkata
    depends_on:
      - api
    networks:
      - academyflo-net

  nginx:
    image: nginx:1.27-alpine
    container_name: academyflo-staging-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - ${SSL_CERT_PATH:-/dev/null}:/etc/nginx/ssl/cert.pem:ro
      - ${SSL_KEY_PATH:-/dev/null}:/etc/nginx/ssl/key.pem:ro
    depends_on:
      - api
      - admin-web
      - user-web
    networks:
      - academyflo-net

volumes:
  staging_mongo_data:
  staging_redis_data:

networks:
  academyflo-net:
    driver: bridge
