# Staging Docker Compose — extends base with staging-specific config.
# For production-grade deployment with nginx, see deploy/docker-compose.staging.yml
#
# Usage: docker compose -f docker-compose.staging.yml up -d
#
# Prerequisites:
#   - .env.staging file on the server (not committed)
#   - Docker images already pushed to registry

services:
  mongo:
    image: mongo:7
    container_name: playconnect-staging-mongo
    restart: unless-stopped
    volumes:
      - staging_mongo_data:/data/db
    environment:
      TZ: Asia/Kolkata
    command: ['--replSet', 'rs0']
    healthcheck:
      test:
        [
          'CMD',
          'mongosh',
          '--eval',
          "try { rs.status() } catch(e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] }) }",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: playconnect-staging-redis
    restart: unless-stopped
    volumes:
      - staging_redis_data:/data
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory', '256mb', '--maxmemory-policy', 'allkeys-lru']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  api:
    image: ${DOCKER_REGISTRY:-ghcr.io/playconnect}/api:${IMAGE_TAG:-latest}
    container_name: playconnect-staging-api
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file:
      - .env.staging
    environment:
      APP_ENV: staging
      NODE_ENV: production
      PORT: '3001'
      TZ: Asia/Kolkata
      MONGODB_URI: mongodb://mongo:27017/playconnect_staging?replicaSet=rs0
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3001/api/v1/health/liveness']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  admin-web:
    image: ${DOCKER_REGISTRY:-ghcr.io/playconnect}/admin-web:${IMAGE_TAG:-latest}
    container_name: playconnect-staging-admin
    restart: unless-stopped
    ports:
      - '3002:3002'
    env_file:
      - .env.staging
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_ENV: staging
      TZ: Asia/Kolkata
      API_BASE_URL: http://api:3001
    depends_on:
      - api

  user-web:
    image: ${DOCKER_REGISTRY:-ghcr.io/playconnect}/user-web:${IMAGE_TAG:-latest}
    container_name: playconnect-staging-user-web
    restart: unless-stopped
    ports:
      - '3003:3003'
    env_file:
      - .env.staging
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_ENV: staging
      TZ: Asia/Kolkata
      API_BASE_URL: http://api:3001
    depends_on:
      - api

volumes:
  staging_mongo_data:
  staging_redis_data:
