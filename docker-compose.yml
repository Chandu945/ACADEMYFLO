services:
  mongo:
    image: mongo:7
    container_name: playconnect-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      TZ: Asia/Kolkata
    command: ['--replSet', 'rs0']
    healthcheck:
      test:
        [
          'CMD',
          'mongosh',
          '--eval',
          "try { rs.status() } catch(e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] }) }",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  redis:
    image: redis:7-alpine
    container_name: playconnect-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory', '256mb', '--maxmemory-policy', 'allkeys-lru']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: playconnect-api
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      APP_ENV: development
      NODE_ENV: production
      PORT: '3001'
      TZ: Asia/Kolkata
      MONGODB_URI: mongodb://mongo:27017/playconnect?replicaSet=rs0
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: info
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3001/api/v1/health/liveness']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '4.0'

  admin-web:
    build:
      context: .
      dockerfile: apps/admin-web/Dockerfile
    container_name: playconnect-admin-web
    restart: unless-stopped
    ports:
      - '3002:3002'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_ENV: development
      API_BASE_URL: http://api:3001
      TZ: Asia/Kolkata
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  user-web:
    build:
      context: .
      dockerfile: apps/user-web/Dockerfile
    container_name: playconnect-user-web
    restart: unless-stopped
    ports:
      - '3003:3003'
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_ENV: development
      API_BASE_URL: http://api:3001
      TZ: Asia/Kolkata
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

volumes:
  mongo_data:
  redis_data:
