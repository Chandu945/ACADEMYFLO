# Production Docker Compose — extends base with production-specific config.
# For production-grade deployment with nginx, see deploy/docker-compose.prod.yml
#
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   - .env.production file on the server (not committed)
#   - Docker images pushed to registry with version tag
#   - External MongoDB recommended (managed service)

services:
  api:
    image: ${DOCKER_REGISTRY:-ghcr.io/playconnect}/api:${IMAGE_TAG}
    container_name: playconnect-prod-api
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      NODE_ENV: production
      PORT: '3001'
      TZ: Asia/Kolkata
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3001/api/v1/health/liveness']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  admin-web:
    image: ${DOCKER_REGISTRY:-ghcr.io/playconnect}/admin-web:${IMAGE_TAG}
    container_name: playconnect-prod-admin
    restart: unless-stopped
    ports:
      - '3002:3002'
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_ENV: production
      TZ: Asia/Kolkata
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    depends_on:
      - api
