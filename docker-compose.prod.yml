# Production Docker Compose — extends base with production-specific config.
# For production-grade deployment with nginx, see deploy/docker-compose.prod.yml
#
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
#   - .env.production file on the server (not committed)
#   - Docker images pushed to registry with version tag
#   - External MongoDB recommended (managed service)

services:
  redis:
    image: redis:7-alpine
    container_name: playconnect-prod-redis
    restart: unless-stopped
    volumes:
      - prod_redis_data:/data
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory', '256mb', '--maxmemory-policy', 'allkeys-lru']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  api:
    image: ${DOCKER_REGISTRY:-ghcr.io/playconnect}/api:${IMAGE_TAG}
    container_name: playconnect-prod-api
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      NODE_ENV: production
      PORT: '3001'
      TZ: Asia/Kolkata
    # readiness (not liveness) — verifies MongoDB connectivity too, since Mongo
    # is an external managed service and there is no compose-level healthcheck for it.
    # `restart: unless-stopped` does not loop on unhealthy status, so transient
    # Mongo blips do not cause restart storms.
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3001/api/v1/health/readiness']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '4.0'

  admin-web:
    image: ${DOCKER_REGISTRY:-ghcr.io/playconnect}/admin-web:${IMAGE_TAG}
    container_name: playconnect-prod-admin
    restart: unless-stopped
    ports:
      - '3002:3002'
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_ENV: production
      TZ: Asia/Kolkata
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
    depends_on:
      - api

  user-web:
    image: ${DOCKER_REGISTRY:-ghcr.io/playconnect}/user-web:${IMAGE_TAG}
    container_name: playconnect-prod-user-web
    restart: unless-stopped
    ports:
      - '3003:3003'
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_ENV: production
      TZ: Asia/Kolkata
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
    depends_on:
      - api

volumes:
  prod_redis_data:
