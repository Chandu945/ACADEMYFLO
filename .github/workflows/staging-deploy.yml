name: Deploy to Staging

on:
  push:
    branches: [main]

concurrency:
  group: staging-deploy
  cancel-in-progress: false

env:
  DOCKER_REGISTRY: ghcr.io/${{ github.repository_owner }}
  IMAGE_TAG: staging-${{ github.sha }}

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/api:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_REGISTRY }}/api:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Admin Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin-web/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/admin-web:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_REGISTRY }}/admin-web:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push User Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/user-web/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_REGISTRY }}/user-web:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_REGISTRY }}/user-web:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Staging Server
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: staging

    steps:
      - name: Checkout (for compose files)
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/playconnect
            export DOCKER_REGISTRY=${{ env.DOCKER_REGISTRY }}
            export IMAGE_TAG=${{ env.IMAGE_TAG }}
            docker compose -f docker-compose.staging.yml pull
            docker compose -f docker-compose.staging.yml up -d --remove-orphans
            docker image prune -f

  smoke-test:
    name: Post-Deploy Smoke Test
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout (for smoke-check script)
        uses: actions/checkout@v4

      - name: Wait for services to stabilize
        run: sleep 15

      - name: Run smoke check
        env:
          API_URL: ${{ secrets.STAGING_API_URL }}
          ADMIN_URL: ${{ secrets.STAGING_ADMIN_URL }}
          USER_URL: ${{ secrets.STAGING_USER_URL }}
        run: node scripts/smoke-check.mjs
